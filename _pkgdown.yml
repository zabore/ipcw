url: https://www.emilyzabor.com/ipcw

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    bg: "#ffffff"
    fg: "#4b4b45"
    primary: "#0078bf"
    success: "#f08122"

development:
  mode: release
  version_label: default

home:
  title: "ipcw: Inverse Probability of Censoring Weighted Methods"
  description: >
    R functions for IPCW analysis of single-event and competing risks
    survival data, companion to Zabor & Eaton (2025).
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  type: light
  structure:
    left:  [home, reference, articles, news]
    right: [search, github]
  components:
    home:
      icon: fa-home
      href: index.html
      aria-label: Home
    github:
      icon: fa-github
      href: https://github.com/zabore/ipcw
      aria-label: GitHub
    news:
      text: News
      href: news/index.html

articles:
  - title: "Guided Examples"
    navbar: ~
    contents:
      - single-event-guided-example
      - competing-risks-guided-example

reference:
  - title: "Single-event IPCW"
    desc: >
      Functions for IPCW analysis of single-event survival data,
      including data simulation, weight estimation, weighted Cox
      regression, and weighted Kaplan-Meier curves.
    contents:
      - sim_data_se
      - get_ipcw_wgt_se
      - get_ipcw_cox_fit_se
      - get_ipcw_km_prob_x_se
      - get_cox_fit_se
      - get_boot_var_se
      - get_boot_pci_se
      - get_ipcw_boot_se
      - plot_ipcw_km_boot_ci_se
      - cox_boot_lhr
  - title: "Competing-risks IPCW"
    desc: >
      Functions for IPCW analysis of competing risks data, including
      weight estimation, cumulative incidence estimation, and
      Fine-Gray regression.
    contents:
      - sim_data_cr
      - wide_to_long_cr
      - add_ipcw_weights_cr
      - cuminc_naive_cr
      - cuminc_waverage_cr
      - cuminc_ipcw_cr
      - fg_split_cr
      - add_fg_weights_cr
      - fg_naive_cr
      - fg_weighted_cr
